<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OBS Twitch Chat Overlay</title>
    <link rel="stylesheet" href="style.css" type="text/css">
    <script src="settings.js"></script>
</head>
<body>

    <div id="chat-container"></div>

    <script type="module">
        import tmi from 'https://esm.sh/tmi.js';
        import { parseEmotes } from 'https://esm.sh/emotettv';

        // ==========================================
        //               USER SETTINGS
        // ==========================================

        // Helper function to convert Hex + Opacity to RGBA
        function hexToRgba(hex, opacityPercentage) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16),
                a = opacityPercentage / 100;
            return `rgba(${r}, ${g}, ${b}, ${a})`;
        }

        // Fallback values just in case settings.js isn't found
        const defaultSettings = {
            twitchChannel: 'OwlishGeorge',
            maxMessages: 15,
            messageLifetimeMs: 20000,
            pillboxBgColor: '#000000',
            pillboxOpacity: 65,
            pillboxRadius: 8,
            pillboxPadding: '8px 12px',
            pillboxBorder: 'none',
            messageGap: 8,
            userFontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif",
            userFontSize: 16,
            userFontWeight: 800,
            userShadowColor: '#000000',
            userShadowBlur: 2,
            msgFontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif",
            msgColor: '#f8f8f8',
            msgFontSize: 16,
            msgFontWeight: 400,
            msgShadowColor: '#000000',
            msgShadowBlur: 2
        };

        // Load settings from the generated file or fall back to defaults
        const settings = typeof OBS_CHAT_SETTINGS !== 'undefined' ? OBS_CHAT_SETTINGS : defaultSettings;

        // Core TMI Configuration
        const TWITCH_CHANNEL = settings.twitchChannel;
        const MAX_MESSAGES = settings.maxMessages;
        const ENABLE_FADE_OUT = settings.messageLifetimeMs > 0;
        const MESSAGE_LIFETIME_MS = settings.messageLifetimeMs;

        // Dynamically Inject CSS based on Settings
        const bgColorWithOpacity = hexToRgba(settings.pillboxBgColor, settings.pillboxOpacity);
        const dynamicStyles = document.createElement('style');

        dynamicStyles.innerHTML = `
            /* Container Layout */
            #chat-container {
                gap: ${settings.messageGap}px !important;
            }

            /* Pillbox Styling */
            .chat-message {
                background-color: ${bgColorWithOpacity} !important;
                border-radius: ${settings.pillboxRadius}px !important;
                padding: ${settings.pillboxPadding} !important;
                border: ${settings.pillboxBorder} !important;
                margin-bottom: 0 !important; /* Overridden by gap */
            }

            /* Username Typography */
            .username {
                font-family: ${settings.userFontFamily} !important;
                font-size: ${settings.userFontSize}px !important;
                font-weight: ${settings.userFontWeight} !important;
                text-shadow: 1px 1px ${settings.userShadowBlur}px ${settings.userShadowColor} !important;
            }

            /* Message Text Typography */
            .message-text {
                font-family: ${settings.msgFontFamily} !important;
                color: ${settings.msgColor} !important;
                font-size: ${settings.msgFontSize}px !important;
                font-weight: ${settings.msgFontWeight} !important;
                text-shadow: 1px 1px ${settings.msgShadowBlur}px ${settings.msgShadowColor} !important;
            }
        `;

        document.head.appendChild(dynamicStyles);

        const chatContainer = document.getElementById('chat-container');

        const client = new tmi.Client({
            channels: [TWITCH_CHANNEL]
        });

        client.connect().catch(console.error);

        client.on('message', async (channel, tags, message, self) => {
            const messageElement = document.createElement('div');
            messageElement.classList.add('chat-message');

            const userColor = tags['color'] || '#9146FF';
            const displayName = tags['display-name'] || tags['username'];

            const parsedEmotes = await parseEmotes(message, tags.emotes, {
                channelId: tags['room-id']
            });

            messageElement.innerHTML = `
                <span class="username" style="color: ${userColor};">${displayName}:</span>
                <span class="message-text">${parsedEmotes.toHTML()}</span>
            `;

            chatContainer.appendChild(messageElement);

            while (chatContainer.children.length > MAX_MESSAGES) {
                chatContainer.removeChild(chatContainer.firstChild);
            }

            if (ENABLE_FADE_OUT) {
                setTimeout(() => {
                    messageElement.classList.add('fade-out');

                    messageElement.addEventListener('animationend', () => {
                        if (messageElement.parentNode) {
                            messageElement.parentNode.removeChild(messageElement);
                        }
                    });
                }, MESSAGE_LIFETIME_MS);
            }
        });
    </script>
</body>
</html>
